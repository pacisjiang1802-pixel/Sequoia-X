name: Sequoia-X Daily Picks

on:
  schedule:
    - cron: '28 7 * * 1-5' # Beijing time 15:28, Monday-Friday
  workflow_dispatch:

concurrency:
  group: sequoia-x-db
  cancel-in-progress: false

jobs:
  daily-picks:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    env:
      DB_PATH: data/sequoia_v2.db
      START_DATE: ${{ vars.START_DATE || '2024-01-01' }}
      FEISHU_WEBHOOK_URL: ${{ secrets.FEISHU_WEBHOOK_URL }}
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Restore Sequoia database
        id: cache-restore
        uses: actions/cache/restore@v4
        with:
          path: data/sequoia_v2.db
          key: sequoia-db-${{ github.run_id }}
          restore-keys: |
            sequoia-db-

      - name: Check Feishu webhook
        run: |
          if [ -z "$FEISHU_WEBHOOK_URL" ]; then
            echo "FEISHU_WEBHOOK_URL secret is required for daily picks."
            exit 1
          fi

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install .

      - name: Run daily stock selection
        run: python main.py

      - name: Show database size
        if: always()
        run: |
          ls -lh data || true
          test -f data/sequoia_v2.db && du -h data/sequoia_v2.db || true

      - name: Save Sequoia database
        if: always()
        uses: actions/cache/save@v4
        with:
          path: data/sequoia_v2.db
          key: sequoia-db-${{ github.run_id }}
